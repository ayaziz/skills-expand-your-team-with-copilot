version: '3.8'

services:
  web:
    build: .
    container_name: mergington-api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/mergington
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongo
    volumes:
      - ./src:/app/src
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:7.0
    container_name: mergington-db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=mergington
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
